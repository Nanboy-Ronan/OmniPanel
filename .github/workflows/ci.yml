name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: rpa
          POSTGRES_PASSWORD: rpa
          POSTGRES_DB: rpa
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rpa"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Tests create and drop throwaway rpa_test_* databases on this server.
      PG_TEST_URL: postgresql://rpa:rpa@127.0.0.1:5432/postgres
      RAP_SECRET: test-secret-do-not-use-in-production

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -q
